<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Open TTS</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12h2l3-9 4 18 3-12 2 6h4"/>
        </svg>
      </div>
      <div>
        <h1>Open TTS</h1>
        <div class="subtitle">Local MLX speech synthesis</div>
      </div>
    </header>

    <!-- Status -->
    <div class="status-bar">
      <div class="dot offline" id="statusDot"></div>
      <span class="status-text" id="statusText">Checking server...</span>
      <button class="server-btn" id="startBtn">Start</button>
      <button class="server-btn danger" id="stopBtn" disabled>Stop</button>
    </div>

    <!-- Config -->
    <section class="panel">
      <div class="panel-label">Configuration</div>

      <div class="field">
        <label class="field-label" for="model">Model</label>
        <select id="model" class="select" disabled>
          <option disabled selected>Loading...</option>
        </select>
        <div class="model-meta" id="modelMeta">—</div>
      </div>

      <div class="field">
        <label class="field-label" for="voice">Voice</label>
        <select id="voice" class="select" disabled>
          <option disabled selected>Select model first</option>
        </select>
      </div>

      <div class="field-row">
        <div class="field">
          <label class="field-label" for="language">Language</label>
          <select id="language" class="select">
            <option value="Auto">Auto-detect</option>
            <option value="en">English</option>
            <option value="zh">Chinese</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="hi">Hindi</option>
            <option value="ru">Russian</option>
            <option value="it">Italian</option>
            <option value="pt">Portuguese</option>
          </select>
        </div>
        <div class="field">
          <label class="field-label">Speed</label>
          <div class="slider-wrap">
            <input type="range" id="speed" class="slider" min="0.5" max="3" step="0.1" value="1.5" />
            <span class="slider-value" id="speedValue">1.5x</span>
          </div>
        </div>
      </div>
    </section>

    <!-- Synthesis -->
    <section class="panel">
      <div class="panel-label">
        <span>Synthesis</span>
        <span class="char-count" id="charCount">0 chars</span>
      </div>

      <div class="textarea-wrap">
        <textarea id="previewText" rows="3" placeholder="Enter text to synthesize..."></textarea>
        <button class="copy-btn" id="copyBtn" title="Copy" aria-label="Copy">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
      </div>

      <button id="speakBtn" class="btn btn-primary">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Speak
      </button>

      <div class="viz" id="vizWrap">
        <canvas id="visualizer" width="350" height="38"></canvas>
        <div class="viz-text" id="vizText">Ready</div>
      </div>
    </section>

    <!-- History -->
    <section class="panel history-panel collapsed" id="historyPanel">
      <div class="panel-label history-toggle" id="historyToggle">
        <span>History</span>
        <span style="display:flex;align-items:center;gap:6px;">
          <span class="mono" id="historyCount" style="font-size:10px;color:var(--text-dim)">0</span>
          <span class="chevron">▼</span>
        </span>
      </div>
      <div class="history-list" id="historyList">
        <div class="history-empty">No history yet</div>
      </div>
      <div class="history-footer">
        <button class="icon-btn" id="clearHistory">Clear all</button>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <span id="genCount">GEN: 000</span>
      <span class="sep">|</span>
      <span id="latency">LAT: --</span>
      <span class="sep">|</span>
      <span>v3.0</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
